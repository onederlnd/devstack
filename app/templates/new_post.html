{% extends "base.html" %}
{% block title %}New Post — SparK{% endblock %}

{% block content %}

<div class="form-page">
  <h1 class="form-title">New Post</h1>
  <p class="form-subtitle">Share something with your community</p>

  {% if error %}
    <div class="flash flash-error">{{ error }}</div>
  {% endif %}

  <form method="POST" class="post-form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label>Topic</label>
    <select name="topic_id">
      <option value="">— No topic —</option>
      {% for t in topics %}
        <option value="{{ t.id }}">{{ t.name }}</option>
      {% endfor %}
    </select>
    <label>Title</label>
    <input type="text" name="title" maxlength="200" placeholder="What's on your mind?" required>
    <label>Body</label>
    <textarea name="body" rows="8" maxlength="10000" placeholder="Write something worth sharing..." required></textarea>
    <div class="form-actions">
      <button type="submit" class="btn-submit">Post ✦</button>
      <a href="/" class="btn-cancel">Cancel</a>
    </div>
  </form>
</div>

{% endblock %}
