{% extends "base.html" %}
{% block title %}Topics — SparK{% endblock %}

{% block content %}

<div class="feed-header">
  <h1 class="feed-title">All Topics</h1>
  <a href="/topics/new" class="btn btn-primary">+ New Topic</a>
</div>

<div class="topics-grid">
  {% for topic in topics %}
  <a href="/t/{{ topic.name }}" class="topic-card">
    <div class="topic-card-name">{{ topic.name }}</div>
    <div class="topic-card-desc">{{ topic.description or "No description yet" }}</div>
    <div class="topic-card-count">{{ topic.post_count }} posts</div>
  </a>
  {% endfor %}
</div>

{% endblock %}
