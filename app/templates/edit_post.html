{% extends "base.html" %}
{% block title %}Edit Post — SparK{% endblock %}

{% block content %}

<div class="form-page">
  <h1 class="form-title">Edit Post</h1>
  <p class="form-subtitle">Make changes to your post below</p>

  {% if error %}
    <div class="flash flash-error">{{ error }}</div>
  {% endif %}

  <form method="POST" class="post-form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label>Title</label>
    <input type="text" name="title" value="{{ post.title }}" required>
    <label>Body</label>
    <textarea name="body" rows="8" required>{{ post.body }}</textarea>
    <div class="form-actions">
      <button type="submit" class="btn-submit">Save Changes</button>
      <a href="/posts/{{ post.id }}" class="btn-cancel">Cancel</a>
    </div>
  </form>
</div>

{% endblock %}
